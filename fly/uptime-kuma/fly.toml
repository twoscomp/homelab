app = "dlin-uptime-kuma"
primary_region = "ord"

[build]
  image = "louislam/uptime-kuma:1"

[[mounts]]
  source = "uptime_kuma_data"
  destination = "/app/data"

# Uptime Kuma v2 uses socket.io which requires WebSocket support.
# Using [[services]] instead of [http_service] to explicitly enable
# WebSocket handler alongside HTTP.
[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
