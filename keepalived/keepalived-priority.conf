# systemd drop-in: /etc/systemd/system/keepalived.service.d/priority.conf
#
# Gives keepalived real-time CPU scheduling so its event loop is never
# starved during memory pressure or Docker/NFS I/O spikes, which would
# cause missed VRRP advertisements and spurious failovers.
[Service]
CPUSchedulingPolicy=rr
CPUSchedulingPriority=10
OOMScoreAdjust=-100
