crowdsec_lapi_url: http://security_crowdsec:8080
crowdsec_lapi_key: ${CROWDSEC_CF_BOUNCER_KEY}
# crowdsec_update_frequency: LAPI polling interval
crowdsec_update_frequency: 30s
# update_frequency: Cloudflare worker push interval (top-level field, required — zero panics)
update_frequency: 30s
log_level: info
log_mode: stdout
daemon: false

prometheus:
  enabled: false
  listen_addr: 127.0.0.1
  listen_port: 2112

cloudflare_config:
  accounts:
    - id: ${CF_ACCOUNT_ID}
      token: ${CF_API_TOKEN}
      ip_list_prefix: crowdsec
      default_action: block
      zones:
        - zone_id: ${CF_ZONE_ID}
          actions:
            - block
