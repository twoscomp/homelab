version: "3.9"

# Monitoring stack
# heartbeat-pusher: Checks each internal service URL every minute and
# forwards status=up or status=down to the corresponding push endpoint on
# the public fly.io Uptime Kuma instance. This replaces local Uptime Kuma
# for internal service monitoring — the pusher only sends "up" when the
# service actually responds, so a downed service causes fly.io Kuma to mark
# it offline after the push interval expires.
#
# Prerequisites:
#   1. Deploy the fly.io Uptime Kuma (see fly/uptime-kuma/fly.toml)
#   2. In the fly.io Kuma UI, create Push-type monitors for each internal service
#   3. Add KUMA_MONITORS to .env (see .env.orig for format)
#
# Deploy:
#   docker-compose -f monitoring.yaml config | docker stack deploy -c - monitoring

networks:
  default:
    name: smarthomeserver
    external: true

services:
  heartbeat-pusher:
    image: curlimages/curl:8.6.0
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - TZ=${TZ}
      # Comma-separated pairs of internal service check URL and fly.io push URL.
      # Format: http://check-url|https://dlin-uptime-kuma.fly.dev/api/push/TOKEN,...
      # Generate push tokens in the fly.io Kuma UI (Settings → Push monitors).
      - KUMA_MONITORS=${KUMA_MONITORS:-}
    command:
      - sh
      - -c
      - |
        # We MUST keep using busybox wget for the internal check URL because
        # Alpine curl uses c-ares which fails to resolve Swarm DNS (127.0.0.11).
        # curl (pre-installed) is used for robust TLS connections to Fly.io.
        
        while true; do
          for pair in $$(echo "$$KUMA_MONITORS" | tr ',' '\n'); do
            (
              check_url="$${pair%%|*}"
              push_url="$${pair##*|}"
              
              # Internal Swarm DNS check: use busybox wget (wrapped in timeout just in case)
              if timeout 5 wget -qO /dev/null --timeout=5 "$$check_url" 2>/dev/null; then
                # External Fly.io HTTPS push: use curl to prevent busybox ssl_client hangs
                curl -s -o /dev/null --connect-timeout 5 --max-time 10 "$$push_url?status=up&msg=OK"
              else
                curl -s -o /dev/null --connect-timeout 5 --max-time 10 "$$push_url?status=down&msg=offline"
              fi
            ) &
          done
          wait
          sleep 30
        done
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
