version: "3.9"

x-deploy-nuc: &deploy-nuc
  deploy:
    placement:
      constraints:
        - node.hostname == nuc8-1

x-lsio-nuc: &lsio-nuc
  environment:
    - PUID=568
    - PGID=1001
    - TZ=${TZ}
  deploy:
    placement:
      constraints:
        - node.hostname == nuc8-1

x-deploy-nuc2: &deploy-nuc2
  deploy:
    placement:
      constraints:
        - node.hostname == nuc8-2

x-lsio-nuc2: &lsio-nuc2
  environment:
    - PUID=568
    - PGID=1001
    - TZ=${TZ}
  deploy:
    placement:
      constraints:
        - node.hostname == nuc8-2

x-lsio-nuc-limited: &lsio-nuc-limited
  environment:
    - PUID=568
    - PGID=1001
    - TZ=${TZ}
  deploy:
    placement:
      constraints:
        - node.hostname == nuc8-1
    resources:
      limits:
        memory: 512m

networks:
  default:
    name: smarthomeserver
    external: true

volumes:
  truenas-media:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.0.196,soft,timeo=50,retrans=5,nolock"
      device: :/mnt/newton/media
  tracearr_timescale_data:
  tracearr_redis_data:

services:
  overseerr:
    <<: *deploy-nuc
    image: ghcr.io/seerr-team/seerr:latest
    container_name: overseerr
    init: true
    environment:
      - TZ=${TZ}
    volumes:
      - ${SERVARRDIR}/overseerr/config:/app/config
    restart: unless-stopped

  komga:
    <<: *deploy-nuc
    image: gotson/komga:latest
    container_name: komga
    volumes:
      - ${SERVARRDIR}/komga/config:/config
      - /etc/timezone:/etc/timezone
      - type: volume
        source: truenas-media
        target: /data
    user: "568:1001"
    restart: unless-stopped

  radarr:
    <<: *lsio-nuc2
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - ${SERVARRDIR}/radarr/config:/config
      - type: volume
        source: truenas-media
        target: /data
    restart: unless-stopped

  prowlarr:
    <<: *lsio-nuc2
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    volumes:
      - ${SERVARRDIR}/prowlarr/config:/config
    restart: unless-stopped

  sonarr:
    <<: *lsio-nuc2
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - ${SERVARRDIR}/sonarr/config:/config
      - type: volume
        source: truenas-media
        target: /data
    restart: unless-stopped

  readarr:
    <<: *lsio-nuc
    image: lscr.io/linuxserver/readarr:develop-version-0.4.18.2805
    container_name: readarr
    volumes:
      - ${SERVARRDIR}/readarr/config:/config
      - type: volume
        source: truenas-media
        target: /data
    restart: unless-stopped

  lidarr:
    <<: *lsio-nuc
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    volumes:
      - ${SERVARRDIR}/lidarr/config:/config
      - type: volume
        source: truenas-media
        target: /data
    restart: unless-stopped

  mylar3:
    <<: *lsio-nuc
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    volumes:
      - ${SERVARRDIR}/mylar3/config:/config
      - type: volume
        source: truenas-media
        target: /data
    restart: unless-stopped

  tautulli:
    <<: *lsio-nuc
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    volumes:
      - ${SERVARRDIR}/tautulli/config:/config
    restart: unless-stopped

  bazarr:
    <<: *lsio-nuc-limited
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    volumes:
      - ${SERVARRDIR}/bazarr/config:/config
      - type: volume
        source: truenas-media
        target: /data
    restart: unless-stopped

  recyclarr:
    <<: *deploy-nuc
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    init: true
    user: 568:1001
    volumes:
      - ${DATADIR}/recyclarr/config:/config
    environment:
      - TZ=America/Chicago
      - CRON_SCHEDULE=5 * * * *
      - RECYCLARR_CREATE_CONFIG=true
      - TINI_SUBREAPER=true

  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6
    container_name: cross-seed
    user: 568:1001
    volumes:
        - ${DATADIR}/cross-seed/config:/config
        - type: volume
          source: truenas-media
          target: /downloads
    command: daemon # this enables the daemon
    restart: unless-stopped

  epic-games:
    image: charlocharlie/epicgames-freegames:latest
    container_name: epic-games
    volumes:
      - ${DATADIR}/epic-games/config:/usr/app/config
    deploy:
      placement:
        constraints:
          - node.hostname == nuc8-1
      resources:
        limits:
          memory: 512m

  plex-meta-manager:
    image: kometateam/kometa:nightly
    container_name: plex-meta-manager
    user: 568:1001
    environment:
      - TZ=America/Chicago #optional
      - KOMETA_TIME=03:15,15:15
    volumes:
      - ${DATADIR}/plex-meta-manager/config:/config
    deploy:
      placement:
        constraints:
          - node.hostname == nuc8-1
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  maintainerr:
    <<: *deploy-nuc
    environment:
      - TZ=America/Chicago
      - MAINTAINERR_SCHEDULE=30 * * * *
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    user: 568:1001
    volumes:
      - ${DATADIR}/maintainerr:/opt/data
    deploy:
      placement:
        constraints:
          - node.hostname == nuc8-1
      resources:
        limits:
          memory: 512m
    # ports:
    #   - 6246:6246
    restart: unless-stopped

  tracearr-db:
    <<: *deploy-nuc
    image: timescale/timescaledb-ha:pg18.1-ts2.25.0
    environment:
      POSTGRES_USER: tracearr
      POSTGRES_PASSWORD: ${TRACEARR_DB_PASSWORD}
      POSTGRES_DB: tracearr
    volumes:
      - tracearr_timescale_data:/home/postgres/pgdata/data

  tracearr-redis:
    <<: *deploy-nuc
    image: redis:8-alpine
    volumes:
      - tracearr_redis_data:/data

  tracearr:
    <<: *deploy-nuc
    image: ghcr.io/connorgallopo/tracearr:latest
    environment:
      TZ: ${TZ}
      DATABASE_URL: postgres://tracearr:${TRACEARR_DB_PASSWORD}@media_tracearr-db:5432/tracearr
      REDIS_URL: redis://media_tracearr-redis:6379
      JWT_SECRET: ${TRACEARR_JWT_SECRET}
      COOKIE_SECRET: ${TRACEARR_COOKIE_SECRET}
    volumes:
      - ${DATADIR}/tracearr/backup:/data/backup
